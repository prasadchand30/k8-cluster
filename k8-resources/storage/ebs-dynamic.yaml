kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: ebs-dynaimc-claim
spec:
  storageClassName: "ebs-dynaimc-sc"
  acccessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5gi
---
kind: pod
apiVersion: v1
metadata:
  name: nginx-dynaimc
  labels:
    projct: expense
    purpose: ebs
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    PersistentVolumeClaim:
      claim: ebs-dynamic-claim
---
kind: service
apiVersion: v1
metadata:
   name: nginx-lb
spec:
  type: LoadBalencer
  selector:
    purpose: ebs
    project: expense
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80