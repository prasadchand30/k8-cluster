kind: CondigMap
apiVersion: v1
metadata:
  name: backend
  namespace: expense
data:
  DB_HOST: my_sql

  ----


kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend
  namespace: expense
  labels:
    component: backend
    proejct: expense
    tier: app
spec:
  replicas: 3
  selector:
    matchLabels:
      component: backend
      proejct: expense
      tier: app
  template:
    metadata:
      labels:
        component: backend
        proejct: expense
        tier: app
    spec:
      containers:
      - name: backend
        image: joindevops/backend:v1.0
        envFrom:
        - configMapRef:
            name: backend

----

kind: service
apiVersion: v1
metadata:
  name: backend
spec:
  selector:
    labels:
      component: backend
      proejct: expense
      tier: app
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080